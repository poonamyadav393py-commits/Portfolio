# ──────────────────────────────────────────────
# Netlify Configuration — Production-Grade SPA
# ──────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"

# ── SPA Fallback Redirect ──
# Netlify serves existing files (JS, CSS, images) first.
# Only requests that don't match a real file fall through to index.html.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── MIME Type Headers ──
# Explicitly set correct Content-Type for all JS/CSS/SVG assets
# to prevent Netlify CDN from ever serving application/octet-stream.

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type  = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type  = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Content-Type  = "image/svg+xml"
    Cache-Control = "public, max-age=86400"

# ── Security & Performance Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options  = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy  = "strict-origin-when-cross-origin"

# ── Cache static images aggressively ──
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/Fiteats/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/retirewell/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
